<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSL Certificates · Panorama</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* ── SSL status chips ────────────────────────────────────── */
    .ssl-ok       { background:#f0fdf4; border-color:#bbf7d0; color:var(--success); }
    .ssl-warning  { background:#fffbeb; border-color:#fed7aa; color:var(--warn); }
    .ssl-critical { background:#fff7ed; border-color:#fdba74; color:#c2410c; }
    .ssl-expired  { background:#fef2f2; border-color:#fecaca; color:var(--danger); }
    .ssl-error    { background:var(--surface2); border-color:var(--border); color:var(--muted); }
    .ssl-unknown  { background:var(--surface2); border-color:var(--border); color:var(--muted); }

    /* ── Row tinting ─────────────────────────────────────────── */
    tr.row-critical td { background:#fffaf5; }
    tr.row-expired  td { background:#fef9f9; }
    tr.row-critical:hover td { background:#fff3e0 !important; }
    tr.row-expired:hover  td { background:#fef2f2 !important; }

    /* ── Days left coloring ──────────────────────────────────── */
    .days-ok       { font-family:var(--font-mono); font-size:.78rem; font-weight:600; color:var(--success); }
    .days-warning  { font-family:var(--font-mono); font-size:.78rem; font-weight:600; color:var(--warn); }
    .days-critical { font-family:var(--font-mono); font-size:.78rem; font-weight:600; color:#c2410c; }
    .days-expired  { font-family:var(--font-mono); font-size:.78rem; font-weight:600; color:var(--danger); }
    .days-error    { font-family:var(--font-mono); font-size:.78rem; color:var(--muted); }
    .days-unknown  { font-family:var(--font-mono); font-size:.78rem; color:var(--muted); }

    .env-label-badge {
      font-family: var(--font-mono);
      font-size: .62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      background: var(--blue-pale);
      border: 1px solid #bfdbfe;
      color: var(--blue-dark);
      border-radius: var(--r-sm);
      padding: 2px 8px;
      white-space: nowrap;
    }

    .error-text {
      font-family: var(--font-mono);
      font-size: .7rem;
      color: var(--danger);
    }

    /* ── Serial number — long hex, keep compact ─────────────── */
    .serial-val {
      font-size: .62rem;
      color: var(--text2);
      max-width: 120px;
      display: inline-block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
      cursor: default;
    }

    /* ── No env/host bar needed — override content padding ───── */
    .content { padding-top: 20px; }
  </style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <a href="/" class="back-link">&#8592; Panorama</a>
      <h1>&#x1F512; <span>SSL</span> Certificates</h1>
      <div class="subtitle">TLS certificate expiry &amp; validity across all hosts</div>
    </div>
    <div class="controls">
      <button class="btn sm secondary" onclick="exportCSV()">&#x2193; CSV</button>
      <button class="btn sm warn" onclick="loadCerts()">&#x21BA; Re-check All</button>
    </div>
  </header>

  <div class="content">

    <div id="emptyState" class="state">
      <span class="spinner"></span> Connecting to all hosts...
    </div>

    <div id="sslContent" style="display:none"></div>

  </div>
</div>

<script src="/static/js/ssl.js"></script>
</body>
</html>
